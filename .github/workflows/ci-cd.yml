# .github/workflows/ci-cd.yml
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1. Tests unitarios/integración con Vitest (mockeados con MSW, no necesitan backend real).
  unit-tests:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:coverage

  # 2. E2E con Cypress contra backend/frontend reales. Solo corre si Vitest pasó.
  e2e:
    name: E2E (Cypress)
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jate_user
          POSTGRES_PASSWORD: jateP455word
          POSTGRES_DB: posts_db_pg
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U jate_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      mongo:
        image: mongo:7
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      # Checkout de este repo (el frontend), en la raíz del runner.
      - uses: actions/checkout@v4

      # higuera-blog-backend vive en OTRO repositorio de GitHub, no en una
      # carpeta hermana como en el entorno local de desarrollo. Hace falta
      # clonarlo aparte, en una subcarpeta, para poder levantarlo en este job.
      # Como ese repo es público, no hace falta ningún token extra. Si en algún
      # momento pasa a ser privado, agregá `token: ${{ secrets.BACKEND_REPO_TOKEN }}`
      # con un Personal Access Token que tenga permiso de lectura sobre ese repo
      # (el GITHUB_TOKEN por defecto solo puede leer el repo donde corre el workflow).
      - name: Clonar higuera-blog-backend
        uses: actions/checkout@v4
        with:
          repository: franciscohiguera1975/higuera-blog-backend
          path: backend

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias del backend
        working-directory: backend
        run: npm ci

      - name: Instalar dependencias del frontend
        run: npm ci

      - name: Arrancar el backend
        working-directory: backend
        run: npm run start:dev &
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: jate_user
          DB_PASS: jateP455word
          DB_NAME: posts_db_pg
          MONGO_URI: mongodb://localhost:27017/posts_db_mongo
          JWT_SECRET: supersecret
          JWT_EXPIRES_IN: 3600s
          # GoogleStrategy (src/auth/google.strategy.ts) llama a passport-oauth2 con
          # estos valores en el constructor, y esa librería rechaza un clientID vacío
          # (aunque el código tenga `?? ''` de fallback) tirando el bootstrap entero de
          # Nest abajo. Los specs de este tutorial nunca ejercitan el login con Google,
          # así que cualquier valor no vacío alcanza para que la app arranque en CI.
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          GOOGLE_CALLBACK_URL: http://localhost:3000/auth/google/callback

      - name: Arrancar el frontend
        run: npm run dev -- --port 5173 &

      - name: Esperar a que backend y frontend respondan
        run: npx wait-on http://localhost:3000/categories http://localhost:5173 --timeout 60000

      - name: Correr Cypress
        run: npx cypress run

      - name: Subir screenshots de fallas (si las hay)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots

  # 3. Deploy a la VPS. Solo corre en push a main, y solo si Vitest y Cypress pasaron.
  deploy:
    name: Deploy a VPS
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Create env for build
        run: |
          printf "%s" "${{ secrets.REACT_ENV }}" > .env.production

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: "dist/*"
          target: "/tmp/react_build"

      - name: Activate build on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -e

            mkdir -p /var/www/higuera-blog-react-app
            rm -rf /var/www/higuera-blog-react-app/*
            cp -r /tmp/react_build/dist/* /var/www/higuera-blog-react-app/

            chown -R www-data:www-data /var/www/higuera-blog-react-app

            nginx -t
            systemctl reload nginx
